<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07080c" />
  <title>Playa Dance · Soirées</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div class="topbar">
      <div class="caption" id="today-caption">—</div>
      <h1>Soirées</h1>
    </div>
    <nav id="days" class="days" role="tablist" aria-label="Jour de la semaine"></nav>
  </header>

  <main>
    <section id="cards" class="cards-view" aria-hidden="false">
      <p class="loading">Chargement…</p>
    </section>
    <section id="calendar" class="calendar-view" hidden aria-hidden="true">
      <div class="week-grid" id="week-grid"></div>
    </section>
  </main>

  <nav class="tabbar" role="tablist" aria-label="Mode d'affichage">
    <button data-view="cards" class="active" type="button">
      <span class="icon" aria-hidden="true">▤</span><span>Cartes</span>
    </button>
    <button data-view="calendar" type="button">
      <span class="icon" aria-hidden="true">▦</span><span>Calendrier</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
