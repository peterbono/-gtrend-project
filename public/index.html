<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07080c" />
  <title>Playa Dance · Nights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div class="caption" id="today-caption">—</div>
    <nav id="day-strip" class="day-strip" aria-label="Day of the week"></nav>
  </header>

  <main id="main">
    <div class="filter-row">
      <button id="filter-cta" class="filter-cta" type="button" aria-haspopup="dialog" aria-controls="filter-drawer">
        <svg class="fc-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="21" y1="5" x2="14" y2="5"/><line x1="10" y1="5" x2="3" y2="5"/>
          <line x1="21" y1="12" x2="12" y2="12"/><line x1="8" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="19" x2="16" y2="19"/><line x1="12" y1="19" x2="3" y2="19"/>
          <circle cx="12" cy="5" r="2"/><circle cx="10" cy="12" r="2"/><circle cx="14" cy="19" r="2"/>
        </svg>
        Filters
        <span id="filter-badge" class="filter-badge" hidden>0</span>
      </button>
    </div>
    <section id="cards" class="cards-view" aria-live="polite" aria-busy="false">
      <p class="loading">Loading…</p>
    </section>

    <section id="calendar" class="calendar-view" hidden>
      <div class="cal-header">
        <button id="cal-prev" class="cal-nav" aria-label="Previous month">‹</button>
        <h2 id="cal-month-label" class="cal-month-label">—</h2>
        <button id="cal-next" class="cal-nav" aria-label="Next month">›</button>
      </div>
      <div class="cal-weekdays" aria-hidden="true">
        <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
      <div id="cal-grid" class="cal-grid"></div>
    </section>

    <section id="map-view" class="map-view" hidden>
      <div id="map" class="map"></div>
      <div class="map-legend">
        <span class="ml-info">Party locations · <span id="map-count">0</span></span>
      </div>
    </section>
  </main>

  <div id="filter-drawer" class="filter-drawer" hidden>
    <div class="fd-backdrop"></div>
    <div class="fd-sheet" role="dialog" aria-modal="true" aria-label="Filters">
      <div class="fd-handle" aria-hidden="true"></div>
      <div class="fd-title">Filters</div>
      <div class="fd-section">
        <div class="fd-label">Show</div>
        <div id="filter-toggle" class="filter-toggle" role="group" aria-label="Event type filter">
          <button type="button" data-filter="all" class="active" aria-pressed="true">All events</button>
          <button type="button" data-filter="parties" aria-pressed="false">Parties only</button>
        </div>
      </div>
      <div class="fd-section">
        <div class="fd-label">Dance styles</div>
        <div id="style-chips" class="style-chips" role="group" aria-label="Dance style filter"></div>
      </div>
      <div class="fd-actions">
        <button id="fd-reset" class="fd-reset" type="button">Reset</button>
        <button id="fd-done" class="fd-done" type="button">Done</button>
      </div>
    </div>
  </div>

  <nav class="tabbar" aria-label="View mode">
    <button data-view="cards" class="active" type="button">
      <svg class="t-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.582a.5.5 0 0 1 0 .962L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
        <path d="M20 3v4"/>
        <path d="M22 5h-4"/>
        <path d="M4 17v2"/>
        <path d="M5 18H3"/>
      </svg>
      <span class="t-label">Events</span>
    </button>
    <button data-view="calendar" type="button">
      <svg class="t-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 2v4"/>
        <path d="M16 2v4"/>
        <rect width="18" height="18" x="3" y="4" rx="2"/>
        <path d="M3 10h18"/>
        <path d="M8 14h.01"/>
        <path d="M12 14h.01"/>
        <path d="M16 14h.01"/>
        <path d="M8 18h.01"/>
        <path d="M12 18h.01"/>
        <path d="M16 18h.01"/>
      </svg>
      <span class="t-label">Calendar</span>
    </button>
    <button data-view="map" type="button">
      <svg class="t-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/>
        <path d="M15 5.764v15"/>
        <path d="M9 3.236v15"/>
      </svg>
      <span class="t-label">Map</span>
    </button>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin defer></script>
  <script src="app.js" defer></script>
</body>
</html>
