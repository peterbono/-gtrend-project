# Diagnostic ponctuel : cherche "zouk/bachazouk" dans l'historique WhatsApp.
# A lancer manuellement. Reutilise la session du cache (ne la sauve pas).
name: Find zouk (diagnostic)

on:
  workflow_dispatch:
    inputs:
      scan_hours:
        description: "Fenetre d'historique (h)"
        required: false
        default: "240"
      scan_limit:
        description: "Max messages par groupe"
        required: false
        default: "1000"

concurrency:
  group: whatsapp-listener
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  find:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --omit=dev
      - name: Restore WhatsApp session cache
        id: restore-session
        uses: actions/cache/restore@v4
        with:
          path: .wwebjs_auth
          key: wwebjs-auth-${{ github.run_id }}
          restore-keys: |
            wwebjs-auth-
      - name: Run find-zouk
        env:
          GROUP_NAME: ${{ vars.GROUP_NAME || 'PDC Dance Socials' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VISION_MODEL: ${{ vars.VISION_MODEL || 'gemini-2.5-flash' }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          SCAN_HOURS: ${{ inputs.scan_hours || '240' }}
          SCAN_LIMIT: ${{ inputs.scan_limit || '1000' }}
          READY_TIMEOUT_SECONDS: "240"
        run: |
          if [ -z "${{ steps.restore-session.outputs.cache-matched-key }}" ]; then
            echo "::error::Pas de session en cache."
            exit 1
          fi
          node scripts/find-zouk.js
