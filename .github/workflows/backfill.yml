# Backfill : fetch les N dernieres heures de messages du groupe et upsert.
# Utile au demarrage (peupler la web app) ou apres une coupure du cron.

name: Backfill WhatsApp history

on:
  schedule:
    # Backfill toutes les 4h, decale de 30 min pour eviter de collisionner
    # avec le cron horaire :00. Couvre 36h pour rattraper les coupures eventuelles
    # (cron rate, panne WhatsApp, etc.) avec une bonne marge de dedup.
    - cron: '30 */4 * * *'
  workflow_dispatch:
    inputs:
      hours:
        description: "Heures d'historique a fetch"
        required: false
        default: "36"
      limit:
        description: "Nombre max de messages a parcourir"
        required: false
        default: "300"

concurrency:
  group: whatsapp-listener
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci --omit=dev

      - name: Restore WhatsApp session cache
        id: restore-session
        uses: actions/cache/restore@v4
        with:
          path: .wwebjs_auth
          key: wwebjs-auth-${{ github.run_id }}
          restore-keys: |
            wwebjs-auth-

      # Session expiree/absente = etat attendu (l'alerte est geree par le
      # listener cron horaire). On ne marque pas ce run en rouge ; seul un vrai
      # crash le fait. needs_relink coupe aussi la sauvegarde du cache.
      - name: Run backfill
        id: backfill
        env:
          GROUP_NAME: ${{ vars.GROUP_NAME || 'PDC Dance Socials' }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          VISION_MODEL: ${{ vars.VISION_MODEL || 'gemini-2.5-flash' }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          BACKFILL_HOURS: ${{ inputs.hours || '36' }}
          BACKFILL_LIMIT: ${{ inputs.limit || '300' }}
          READY_TIMEOUT_SECONDS: "240"
        run: |
          set +e
          if [ -z "${{ steps.restore-session.outputs.cache-matched-key }}" ]; then
            echo "needs_relink=1" >> "$GITHUB_OUTPUT"
            echo "::warning::Aucune session .wwebjs_auth en cache — bootstrap requis (voir l'issue du listener)."
            exit 0
          fi
          node src/backfill.js
          code=$?
          if [ "$code" -eq 0 ]; then
            exit 0
          elif [ "$code" -eq 75 ]; then
            echo "needs_relink=1" >> "$GITHUB_OUTPUT"
            echo "::warning::Session WhatsApp expiree — re-link requis (voir l'issue du listener)."
            exit 0
          else
            echo "::error::Backfill crashe (exit $code)."
            exit "$code"
          fi

      - name: Save WhatsApp session cache
        if: always() && steps.backfill.outputs.needs_relink != '1' && hashFiles('.wwebjs_auth/**') != ''
        uses: actions/cache/save@v4
        with:
          path: .wwebjs_auth
          key: wwebjs-auth-${{ github.run_id }}
